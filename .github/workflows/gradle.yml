name: HW GitHubActions

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target environment'
        required: true
        default: 'default'
        type: choice
        options:
          - default
          - test

jobs:
  selenide-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: ${{ inputs.target_env }}

    services:
      selenium:
        image: selenium/standalone-chrome:latest
        options: --shm-size=2g
        ports:
          - 4444:4444

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew


      - name: Clean old allure results
        run: rm -rf build/allure-results


      - name: Run Selenide tests
        env:
          SELENIUM_REMOTE_URL: http://localhost:4444/wd/hub
          CI_USERNAME: ${{ secrets.LOGIN }}
          CI_PASSWORD: ${{ secrets.PASSWORD }}
        run: ./gradlew --no-daemon clean selenideTest -Denv=${{ inputs.target_env }} -Dusername="$CI_USERNAME" -Dpassword="$CI_PASSWORD"


      - name: Debug current Selenide allure results
        if: always()
        run: |
          echo "=== SELENIDE build/allure-results ==="
          find build/allure-results -type f | sort || true

      - name: Upload Selenide allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenide-allure-results
          path: build/allure-results
          if-no-files-found: warn
          include-hidden-files: true

  playwright-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: ${{ inputs.target_env }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Install Playwright browsers
        run: ./gradlew --no-daemon playwrightInstall


      - name: Clean old allure results
        run: rm -rf build/allure-results


      - name: Run Playwright tests
        env:
          HEADLESS: true
          CI_USERNAME: ${{ secrets.LOGIN }}
          CI_PASSWORD: ${{ secrets.PASSWORD }}
        run: xvfb-run ./gradlew --no-daemon clean playwrightTest -Denv=${{ inputs.target_env }} -Dusername="$CI_USERNAME" -Dpassword="$CI_PASSWORD"


      - name: Debug current Playwright allure results
        if: always()
        run: |
          echo "=== PLAYWRIGHT build/allure-results ==="
          find build/allure-results -type f | sort || true


      - name: Upload Playwright allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-allure-results
          path: build/allure-results
          if-no-files-found: warn
          include-hidden-files: true

  publish-reports:
    runs-on: ubuntu-latest
    needs: [selenide-tests, playwright-tests]
    if: always()
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Clean report directories
        run: |
          rm -rf selenide-results playwright-results selenide-history playwright-history public gh-pages
          mkdir -p selenide-results playwright-results public

      - name: Download Selenide allure results
        uses: actions/download-artifact@v4
        with:
          name: selenide-allure-results
          path: selenide-results

      - name: Download Playwright allure results
        uses: actions/download-artifact@v4
        with:
          name: playwright-allure-results
          path: playwright-results

      - name: Debug downloaded artifacts
        run: |
          echo "=== SELENIDE RESULTS ==="
          find selenide-results -type f | sort || true
          echo "=== PLAYWRIGHT RESULTS ==="
          find playwright-results -type f | sort || true

      - name: Get Allure history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages
          submodules: false



      - name: Create Selenide executor.json
        run: |
          cat > selenide-results/executor.json <<EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "buildOrder": ${{ github.run_number }},
            "buildName": "Run #${{ github.run_number }}",
            "reportName": "Selenide Allure Report",
            "reportUrl": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/selenide/",
            "buildUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF



      - name: Build Selenide Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: selenide-results
          gh_pages: gh-pages
          allure_report: selenide-report
          allure_history: selenide-history
          subfolder: selenide
          keep_reports: 20


      - name: Create Playwright executor.json
        run: |
          cat > playwright-results/executor.json <<EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "buildOrder": ${{ github.run_number }},
            "buildName": "Run #${{ github.run_number }}",
            "reportName": "Playwright Allure Report",
            "reportUrl": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/playwright/",
            "buildUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF



      - name: Build Playwright Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: playwright-results
          gh_pages: gh-pages
          allure_report: playwright-report
          allure_history: playwright-history
          subfolder: playwright
          keep_reports: 20

      - name: Prepare publish directory
        run: |
          mkdir -p public
          cp -r selenide-history/* public/
          cp -r playwright-history/playwright public/playwright

      - name: Write deployment marker
        run: |
          echo "run=${{ github.run_number }}" > public/deploy-info.txt
          echo "sha=${{ github.sha }}" >> public/deploy-info.txt
          echo "time=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> public/deploy-info.txt

      - name: Create root index.html
        run: |
          cat > public/index.html <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Allure Reports</title>
            <style>
              body {
                font-family: Arial, sans-serif;
                margin: 40px;
                background: #f7f7f7;
                color: #222;
              }
              .container {
                max-width: 800px;
                margin: 0 auto;
                background: white;
                padding: 32px;
                border-radius: 12px;
                box-shadow: 0 4px 16px rgba(0,0,0,0.08);
              }
              h1 {
                margin-top: 0;
              }
              ul {
                list-style: none;
                padding: 0;
              }
              li {
                margin: 16px 0;
              }
              a {
                display: inline-block;
                text-decoration: none;
                color: white;
                background: #2f67ff;
                padding: 12px 18px;
                border-radius: 8px;
              }
              a:hover {
                background: #1f4ed8;
              }
              .meta {
                margin-top: 24px;
                color: #555;
                font-size: 14px;
              }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>Allure Reports</h1>
              <ul>
                <li><a href="./selenide/">Selenide report</a></li>
                <li><a href="./playwright/">Playwright report</a></li>
              </ul>
              <div class="meta">
                <p>Run number: ${{ github.run_number }}</p>
                <p>Commit: ${{ github.sha }}</p>
                <p>Deploy info: <a href="./deploy-info.txt">deploy-info.txt</a></p>
              </div>
            </div>
          </body>
          </html>
          EOF

      - name: Debug publish directory
        run: |
          echo "=== PUBLIC FILES ==="
          find public -type f | sort || true

      - name: Publish Reports
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: public
          keep_files: true
