name: HW GitHubActions

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target environment'
        required: true
        default: 'default'
        type: choice
        options:
          - default
          - test

jobs:
  selenide-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: ${{ inputs.target_env }}

    services:
      selenium:
        image: selenium/standalone-chrome:latest
        options: --shm-size=2g
        ports:
          - 4444:4444

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Run Selenide tests
        env:
          SELENIUM_REMOTE_URL: http://localhost:4444/wd/hub
          CI_USERNAME: ${{ secrets.LOGIN }}
          CI_PASSWORD: ${{ secrets.PASSWORD }}
        run: ./gradlew selenideTest -Denv=${{ inputs.target_env }} -Dusername="$CI_USERNAME" -Dpassword="$CI_PASSWORD"

      - name: Upload Selenide allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenide-allure-results
          path: build/allure-results
          if-no-files-found: warn

  playwright-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: ${{ inputs.target_env }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Install Playwright browsers
        run: ./gradlew playwrightInstall

      - name: Run Playwright tests
        env:
          HEADLESS: true
          CI_USERNAME: ${{ secrets.LOGIN }}
          CI_PASSWORD: ${{ secrets.PASSWORD }}
        run: ./gradlew --no-daemon playwrightTest -Denv=${{ inputs.target_env }} -Dusername="$CI_USERNAME" -Dpassword="$CI_PASSWORD"

      - name: Upload Playwright allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-allure-results
          path: build/allure-results
          if-no-files-found: warn

  publish-reports:
    runs-on: ubuntu-latest
    needs: [ selenide-tests, playwright-tests ]
    if: always()
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Download Selenide allure results
        uses: actions/download-artifact@v4
        with:
          name: selenide-allure-results
          path: selenide-results

      - name: Download Playwright allure results
        uses: actions/download-artifact@v4
        with:
          name: playwright-allure-results
          path: playwright-results

      - name: Get Allure history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages
          submodules: false

      - name: Build Selenide Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: selenide-results
          gh_pages: gh-pages
          allure_report: selenide-report
          allure_history: selenide-history
          subfolder: selenide
          keep_reports: 20

      - name: Build Playwright Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: playwright-results
          gh_pages: gh-pages
          allure_report: playwright-report
          allure_history: playwright-history
          subfolder: playwright
          keep_reports: 20

      - name: Prepare publish directory
        run: |
          mkdir -p public
          cp -r selenide-history/* public/
          cp -r playwright-history/playwright public/playwright

      - name: Create root index.html
        run: |
          cat > public/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Allure Reports</title>
            <style>
              body {
                font-family: Arial, sans-serif;
                margin: 40px;
                background: #f7f7f7;
                color: #222;
              }
              .container {
                max-width: 800px;
                margin: 0 auto;
                background: white;
                padding: 32px;
                border-radius: 12px;
                box-shadow: 0 4px 16px rgba(0,0,0,0.08);
              }
              h1 {
                margin-top: 0;
              }
              ul {
                list-style: none;
                padding: 0;
              }
              li {
                margin: 16px 0;
              }
              a {
                display: inline-block;
                text-decoration: none;
                color: white;
                background: #2f67ff;
                padding: 12px 18px;
                border-radius: 8px;
              }
              a:hover {
                background: #1f4ed8;
              }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>Allure Reports</h1>
              <ul>
                <li><a href="./selenide/">Selenide report</a></li>
                <li><a href="./playwright/">Playwright report</a></li>
              </ul>
            </div>
          </body>
          </html>
          EOF

      - name: Publish Reports
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: public
