name: HW GitHubActions

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target environment'
        required: true
        default: 'default'
        type: choice
        options:
          - default
          - test

jobs:
  selenide-tests:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_env }}

    services:
      selenium:
        image: selenium/standalone-chrome:latest
        options: --shm-size=2g
        ports:
          - 4444:4444

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Run Selenide tests
        env:
          SELENIUM_REMOTE_URL: http://localhost:4444/wd/hub
          CI_USERNAME: ${{ secrets.LOGIN }}
          CI_PASSWORD: ${{ secrets.PASSWORD }}
        run: ./gradlew selenideTest -Denv=${{ inputs.target_env }} -Dusername="$CI_USERNAME" -Dpassword="$CI_PASSWORD"

  playwright-tests:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_env }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Install Playwright browsers
        run: ./gradlew exec -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps"

      - name: Run Playwright tests
        env:
          CI_USERNAME: ${{ secrets.LOGIN }}
          CI_PASSWORD: ${{ secrets.PASSWORD }}
        run: ./gradlew playwrightTest -Denv=${{ inputs.target_env }} -Dusername="$CI_USERNAME" -Dpassword="$CI_PASSWORD"